<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Jogo Online</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}
button {
  padding: 15px;
  margin: 10px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Teste do Servidor</h1>

<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<br>
<button onclick="login()">Login</button>

<h2>Dinheiro: <span id="money">0</span></h2>
<h2>Nível: <span id="level">1</span></h2>

<button onclick="enviarClique()">CLICAR</button>
<button onclick="carregarRanking()">Ver Ranking</button>

<pre id="ranking"></pre>

<script>

const API_URL = "https://meu-servidor-jogo.onrender.com";
let token = null;

async function login() {
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch(API_URL + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  token = data.token;

  alert("Logado com sucesso!");
}

async function enviarClique() {
  if (!token) {
    alert("Faça login primeiro!");
    return;
  }

  const res = await fetch(API_URL + "/click", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();

  document.getElementById("money").innerText = data.money;
  document.getElementById("level").innerText = data.level;
}

async function carregarRanking() {
  const res = await fetch(API_URL + "/ranking");
  const data = await res.json();

  document.getElementById("ranking").innerText = JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
